<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Inicio de Sesión - DentalClinic
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/estilos.css') }}">

</head>


<body class="login-body">

    <main class="login-container">

        <section class="login-card">

            <h1>DentalClinic</h1>

            <p>Sistema de Gestión Dental</p>


            {% if error %}

            <div class="login-error">
                {{ error }}
            </div>

            {% endif %}


            <form
                action="{{ url_for('iniciar_sesion') }}"
                method="POST">

                <label for="rut">
                    RUT
                </label>

                <input
                    type="text"
                    id="rut"
                    name="rut"
                    placeholder="12.345.678-9"
                    maxlength="12"
                    value="{{ rut_ingresado or '' }}"
                    autocomplete="username"
                    required>


                <label for="password">
                    Contraseña
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Ingrese su contraseña"
                    autocomplete="current-password"
                    required>


                <button type="submit">
                    Ingresar
                </button>

            </form>


            <p class="login-ayuda">

                Si olvidó su contraseña, solicite al
                administrador del sistema su restablecimiento.

            </p>

        </section>

    </main>


    <script
        src="{{ url_for('static', filename='js/app.js') }}">
    </script>

</body>

</html>
